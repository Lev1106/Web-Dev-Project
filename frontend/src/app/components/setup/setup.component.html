<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="auth-logo-icon">🌿</span>
            <span class="auth-logo-text">FitTrack</span>
        </div>

        <h2 class="auth-title">Complete Your Profile</h2>
        <p class="auth-subtitle">Tell us about yourself to get started</p>

        <div *ngIf="errorMsg" class="auth-error">{{ errorMsg }}</div>

        <div class="auth-fields">
            <div class="auth-row">
                <input class="auth-input" [(ngModel)]="firstName" placeholder="First Name" />
                <input class="auth-input" [(ngModel)]="lastName" placeholder="Last Name" />
            </div>
            <div class="auth-row">
                <input class="auth-input" [(ngModel)]="weight" type="number" placeholder="Weight (kg)" />
                <input class="auth-input" [(ngModel)]="height" type="number" placeholder="Height (cm)" />
            </div>
            <input class="auth-input" [(ngModel)]="age" type="number" placeholder="Age" />
            <select class="auth-input" [(ngModel)]="gender">
                <option value="male">👨 Male</option>
                <option value="female">👩 Female</option>
            </select>

            <select class="auth-input" [(ngModel)]="activityLevel">
                <option value="Sedentary">🪑 Sedentary</option>
                <option value="Light">🚶 Light</option>
                <option value="Moderate">🏃 Moderate</option>
                <option value="Active">💪 Active</option>
                <option value="Very Active">🔥 Very Active</option>
            </select>

            <div class="goal-section">
                <label class="goal-label">Daily Calorie Goal: <strong>{{ targetCalories }} kcal</strong></label>
                <input
                        type="range"
                        min="1200"
                        max="4000"
                        step="50"
                        [(ngModel)]="targetCalories"
                        class="slider" />
                <div class="slider-range">
                    <span>1200 kcal</span>
                    <span>4000 kcal</span>
                </div>
            </div>
        </div>

        <button class="auth-btn" (click)="save()">Continue →</button>
    </div>
</div>

<style>
    .auth-page {
        min-height: 100vh;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .auth-card {
        background: white;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .auth-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 28px;
    }
    .auth-logo-icon { font-size: 24px; }
    .auth-logo-text { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    .auth-title { font-size: 24px; font-weight: 700; color: #1a1a1a; margin: 0 0 6px; }
    .auth-subtitle { color: #888; margin: 0 0 24px; font-size: 14px; }
    .auth-fields { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .auth-row { display: flex; gap: 12px; }
    .auth-input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        font-size: 14px;
        outline: none;
        box-sizing: border-box;
        transition: border 0.2s;
    }
    .auth-input:focus { border-color: #2e7d32; }
    .auth-btn {
        width: 100%;
        padding: 13px;
        background: #2e7d32;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }
    .auth-btn:hover { background: #1b5e20; }
    .auth-error {
        background: #fdecea;
        color: #c62828;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 16px;
    }
    .goal-section { display: flex; flex-direction: column; gap: 6px; }
    .goal-label { font-size: 14px; color: #444; }
    .slider { width: 100%; accent-color: #2e7d32; }
    .slider-range { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
</style>
