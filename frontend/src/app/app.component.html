<div class="app-wrapper">
    <nav class="navbar">
        <div class="nav-logo">
            <div class="leaf-icon">🌿</div>
            <span class="logo-text">FitTrack</span>
        </div>
        <div class="nav-tabs">
            <ng-container *ngIf="isLoggedIn()">
                <a class="nav-tab" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
                <a class="nav-tab" routerLink="/history" routerLinkActive="active">History</a>
                <a class="nav-tab" routerLink="/profile" routerLinkActive="active">Profile</a>
                <button class="nav-tab logout-btn" (click)="logout()">Log Out</button>
            </ng-container>
        </div>
    </nav>

    <main class="main-content">
        <router-outlet />
    </main>
</div>
